<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun Arcade</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1f2a60 0%, #0b1026 45%, #05070f 100%);
      color: #eef2ff;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(10, 14, 30, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 20px;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 2rem;
    }
    .subtitle {
      margin-top: 8px;
      color: #c7d2fe;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    .top-stats {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.18);
      border: 1px solid rgba(165, 180, 252, 0.2);
      color: #e0e7ff;
      font-weight: bold;
    }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 24px;
    }
    .game-card {
      background: rgba(17, 24, 39, 0.78);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }
    .game-card:hover {
      transform: translateY(-4px);
      border-color: rgba(129, 140, 248, 0.6);
      background: rgba(24, 33, 56, 0.92);
    }
    .game-card.active {
      border-color: #60a5fa;
      background: rgba(24, 33, 56, 0.98);
    }
    .game-card h3 {
      margin: 0 0 8px;
      color: white;
    }
    .game-card p {
      margin: 0;
      line-height: 1.45;
      color: #cbd5e1;
    }
    .panel {
      background: rgba(10, 14, 30, 0.88);
      border-radius: 24px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 16px 40px rgba(0,0,0,0.25);
    }
    .game-layout {
      display: grid;
      grid-template-columns: 1.35fr 0.9fr;
      gap: 20px;
      align-items: start;
    }
    .side-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
    }
    .side-box h3 {
      margin-top: 0;
      margin-bottom: 12px;
    }
    .side-box p, .side-box li {
      color: #dbe4ff;
      line-height: 1.5;
    }
    canvas {
      width: 100%;
      max-width: 760px;
      height: 520px;
      display: block;
      border-radius: 22px;
      border: 3px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, #071123 0%, #0f1d44 45%, #131a3a 100%);
      touch-action: none;
    }
    .buttons, .touch-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .buttons {
      margin-top: 14px;
    }
    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: #2563eb;
      box-shadow: 0 8px 18px rgba(37,99,235,0.28);
    }
    button.secondary {
      background: #111827;
      box-shadow: 0 8px 18px rgba(17,24,39,0.3);
    }
    .touch-controls {
      margin-top: 12px;
    }
    .touch-controls button {
      min-width: 84px;
    }
    .score-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .score-box {
      background: rgba(99,102,241,0.14);
      border-radius: 16px;
      padding: 14px;
      border: 1px solid rgba(165,180,252,0.18);
    }
    .score-label {
      font-size: 0.92rem;
      color: #c7d2fe;
    }
    .score-value {
      margin-top: 4px;
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
    }
    .coming-soon {
      padding: 18px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      color: #dbe4ff;
      line-height: 1.55;
      border: 1px solid rgba(255,255,255,0.08);
    }
    @media (max-width: 940px) {
      .game-layout {
        grid-template-columns: 1fr;
      }
      canvas {
        height: 460px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Fun Arcade</h1>
    <div class="subtitle">10 games, one arcade, and every game uses points.</div>
    <div class="top-stats">
      <div class="pill">Total Arcade Points: <span id="totalPointsHeader">0</span></div>
      <div class="pill">Current Game: <span id="currentGameName">SkyDrop</span></div>
    </div>
  </header>

  <main>
    <section class="menu-grid" id="gameMenu"></section>
    <section class="panel">
      <div id="gameContent"></div>
    </section>
  </main>

  <script>
    const arcadeState = {
      totalPoints: 0,
      activeGame: 'skydrop'
    };

    const games = [
      { id: 'skydrop', title: 'SkyDrop', description: 'A space jumping game. An alien jumps across moons to reach the black portal and then flies a UFO.' },
      { id: 'game2', title: 'Maze Quest', description: 'Coming soon. This game will also use points.' },
      { id: 'game3', title: 'Treasure Tiles', description: 'Coming soon. This game will also use points.' },
      { id: 'game4', title: 'Bubble Match', description: 'Coming soon. This game will also use points.' },
      { id: 'game5', title: 'Racing Dash', description: 'Coming soon. This game will also use points.' },
      { id: 'game6', title: 'Color Tap', description: 'Coming soon. This game will also use points.' },
      { id: 'game7', title: 'Memory Mix', description: 'Coming soon. This game will also use points.' },
      { id: 'game8', title: 'Fruit Catch', description: 'Coming soon. This game will also use points.' },
      { id: 'game9', title: 'Robot Run', description: 'Coming soon. This game will also use points.' },
      { id: 'game10', title: 'Puzzle Spin', description: 'Coming soon. This game will also use points.' }
    ];

    const gameMenu = document.getElementById('gameMenu');
    const gameContent = document.getElementById('gameContent');

    function renderMenu() {
      gameMenu.innerHTML = '';
      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card' + (arcadeState.activeGame === game.id ? ' active' : '');
        card.innerHTML = `<h3>${game.title}</h3><p>${game.description}</p>`;
        card.addEventListener('click', () => {
          arcadeState.activeGame = game.id;
          document.getElementById('currentGameName').textContent = game.title;
          renderMenu();
          renderGame();
        });
        gameMenu.appendChild(card);
      });
    }

    let canvas, ctx, animationId;
    let skyGame = null;
    const keys = { left: false, right: false, jump: false };

    function createSkyDropLevel() {
      return {
        width: 760,
        height: 520,
        gravity: 0.48,
        friction: 0.84,
        gamePoints: 0,
        rewardClaimed: false,
        status: 'playing',
        cameraY: 0,
        stars: createStars(80, 760, 520),
        alien: {
          x: 70,
          y: 440,
          w: 28,
          h: 36,
          vx: 0,
          vy: 0,
          onGround: false,
          color: '#8b5cf6'
        },
        platforms: [
          { x: 20, y: 475, w: 130, h: 24, type: 'moon' },
          { x: 170, y: 410, w: 120, h: 22, type: 'moon' },
          { x: 330, y: 350, w: 110, h: 22, type: 'moon' },
          { x: 510, y: 300, w: 120, h: 22, type: 'moon' },
          { x: 355, y: 235, w: 110, h: 22, type: 'moon' },
          { x: 200, y: 178, w: 115, h: 22, type: 'moon' },
          { x: 370, y: 122, w: 120, h: 22, type: 'moon' },
          { x: 560, y: 78, w: 140, h: 22, type: 'moon' }
        ],
        collectibles: [
          { x: 225, y: 376, r: 8, value: 25, taken: false },
          { x: 382, y: 315, r: 8, value: 25, taken: false },
          { x: 548, y: 265, r: 8, value: 25, taken: false },
          { x: 412, y: 200, r: 8, value: 25, taken: false },
          { x: 252, y: 145, r: 8, value: 25, taken: false },
          { x: 435, y: 90, r: 8, value: 25, taken: false }
        ],
        portal: { x: 625, y: 28, w: 44, h: 44 },
        ufo: { x: 635, y: 58, w: 68, h: 26 }
      };
    }

    function createStars(count, width, height) {
      return Array.from({ length: count }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        r: Math.random() * 1.8 + 0.5,
        alpha: Math.random() * 0.7 + 0.2
      }));
    }

    function addPoints(amount) {
      arcadeState.totalPoints += amount;
      const header = document.getElementById('totalPointsHeader');
      if (header) header.textContent = arcadeState.totalPoints;
    }

    function renderGame() {
      cancelAnimationFrame(animationId);
      if (arcadeState.activeGame !== 'skydrop') {
        const game = games.find(g => g.id === arcadeState.activeGame);
        gameContent.innerHTML = `
          <h2 style="margin-top:0;">${game.title}</h2>
          <div class="coming-soon">
            This game is not built yet.<br><br>
            Rule for this arcade: every game gives points. When you build this game later, keep a score system, reward system, and end screen.
          </div>
        `;
        return;
      }

      gameContent.innerHTML = `
        <div class="game-layout">
          <div>
            <canvas id="skyCanvas" width="760" height="520"></canvas>
            <div class="buttons">
              <button onclick="restartSkyDrop()">Restart Game</button>
              <button class="secondary" onclick="claimReward()">Claim Reward</button>
            </div>
            <div class="touch-controls">
              <button onclick="setTouchMove('left', true)" onmouseup="setTouchMove('left', false)" ontouchstart="setTouchMove('left', true)" ontouchend="setTouchMove('left', false)">Left</button>
              <button onclick="skyJump()">Jump</button>
              <button onclick="setTouchMove('right', true)" onmouseup="setTouchMove('right', false)" ontouchstart="setTouchMove('right', true)" ontouchend="setTouchMove('right', false)">Right</button>
            </div>
          </div>
          <div class="side-box">
            <h3>SkyDrop</h3>
            <div class="score-row">
              <div class="score-box">
                <div class="score-label">This Game Points</div>
                <div class="score-value" id="gamePointsValue">0</div>
              </div>
              <div class="score-box">
                <div class="score-label">Reward Bonus</div>
                <div class="score-value" id="rewardValue">100</div>
              </div>
            </div>
            <p><strong>Story:</strong> An alien is jumping across moons in space. Reach the black portal to travel to a planet. After that, fly the UFO and collect your reward.</p>
            <p><strong>Keyboard:</strong> A or Left Arrow = move left. D or Right Arrow = move right. W, Up Arrow, or Space = jump.</p>
            <p><strong>Touch:</strong> Use the left, jump, and right buttons.</p>
            <p><strong>Goal:</strong> Collect stars for points, jump from moon to moon, and touch the black portal at the top.</p>
            <p id="skyStatusText"><strong>Status:</strong> Jump to the moons and reach the portal.</p>
          </div>
        </div>
      `;

      skyGame = createSkyDropLevel();
      canvas = document.getElementById('skyCanvas');
      ctx = canvas.getContext('2d');
      updatePointDisplays();
      attachControls();
      loop();
    }

    function attachControls() {
      document.onkeydown = e => {
        const key = e.key.toLowerCase();
        if (key === 'a' || key === 'arrowleft') keys.left = true;
        if (key === 'd' || key === 'arrowright') keys.right = true;
        if (key === 'w' || key === 'arrowup' || key === ' ') skyJump();
      };
      document.onkeyup = e => {
        const key = e.key.toLowerCase();
        if (key === 'a' || key === 'arrowleft') keys.left = false;
        if (key === 'd' || key === 'arrowright') keys.right = false;
      };
    }

    function setTouchMove(direction, value) {
      if (direction === 'left') keys.left = value;
      if (direction === 'right') keys.right = value;
    }

    function skyJump() {
      if (!skyGame || skyGame.status !== 'playing') return;
      const a = skyGame.alien;
      if (a.onGround) {
        a.vy = -10.8;
        a.onGround = false;
      }
    }

    function updateSkyGame() {
      const g = skyGame;
      if (!g) return;
      const a = g.alien;

      if (g.status === 'won') {
        a.vx = 0;
        a.vy = 0;
        return;
      }

      if (keys.left) a.vx -= 0.6;
      if (keys.right) a.vx += 0.6;
      a.vx *= g.friction;
      a.vx = Math.max(-5.5, Math.min(5.5, a.vx));
      a.vy += g.gravity;

      a.x += a.vx;
      a.y += a.vy;
      a.onGround = false;

      if (a.x < 0) a.x = 0;
      if (a.x + a.w > g.width) a.x = g.width - a.w;

      for (const p of g.platforms) {
        const falling = a.vy >= 0;
        const hitX = a.x + a.w > p.x && a.x < p.x + p.w;
        const hitY = a.y + a.h >= p.y && a.y + a.h <= p.y + p.h + 12;
        if (falling && hitX && hitY) {
          a.y = p.y - a.h;
          a.vy = 0;
          a.onGround = true;
        }
      }

      if (a.y > g.height + 60) {
        g.status = 'playing';
        g.gamePoints = Math.max(0, g.gamePoints - 40);
        resetAlien();
        updatePointDisplays();
        updateStatus('You fell into space. 40 points were removed. Try again.');
      }

      g.collectibles.forEach(star => {
        if (star.taken) return;
        const dx = (a.x + a.w / 2) - star.x;
        const dy = (a.y + a.h / 2) - star.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (distance < star.r + 18) {
          star.taken = true;
          g.gamePoints += star.value;
          addPoints(star.value);
          updatePointDisplays();
        }
      });

      const portal = g.portal;
      if (
        a.x + a.w > portal.x &&
        a.x < portal.x + portal.w &&
        a.y + a.h > portal.y &&
        a.y < portal.y + portal.h
      ) {
        g.status = 'won';
        g.gamePoints += 100;
        addPoints(100);
        updatePointDisplays();
        updateStatus('You reached the black portal. UFO unlocked. Press Claim Reward.');
      }
    }

    function resetAlien() {
      const a = skyGame.alien;
      a.x = 70;
      a.y = 440;
      a.vx = 0;
      a.vy = 0;
      a.onGround = false;
    }

    function claimReward() {
      if (!skyGame) return;
      if (skyGame.status !== 'won') {
        updateStatus('Reach the portal first, then claim the reward.');
        return;
      }
      if (skyGame.rewardClaimed) {
        updateStatus('Reward already claimed. Restart if you want to play again.');
        return;
      }
      skyGame.rewardClaimed = true;
      skyGame.gamePoints += 150;
      addPoints(150);
      updatePointDisplays();
      updateStatus('Reward claimed. UFO flight completed. You earned 150 bonus points.');
    }

    function restartSkyDrop() {
      skyGame = createSkyDropLevel();
      keys.left = false;
      keys.right = false;
      updatePointDisplays();
      updateStatus('Game restarted. Jump to the moons and reach the portal.');
    }

    function updatePointDisplays() {
      const gp = document.getElementById('gamePointsValue');
      if (gp && skyGame) gp.textContent = skyGame.gamePoints;
      const header = document.getElementById('totalPointsHeader');
      if (header) header.textContent = arcadeState.totalPoints;
    }

    function updateStatus(text) {
      const status = document.getElementById('skyStatusText');
      if (status) status.innerHTML = `<strong>Status:</strong> ${text}`;
    }

    function drawSkyGame() {
      const g = skyGame;
      if (!g || !ctx) return;
      ctx.clearRect(0, 0, g.width, g.height);

      const gradient = ctx.createLinearGradient(0, 0, 0, g.height);
      gradient.addColorStop(0, '#081227');
      gradient.addColorStop(0.5, '#0f214f');
      gradient.addColorStop(1, '#131737');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, g.width, g.height);

      g.stars.forEach(s => {
        ctx.globalAlpha = s.alpha;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;

      drawPlanet(86, 92, 42, '#22c55e');
      drawPlanet(655, 462, 58, '#f59e0b');

      g.platforms.forEach(p => drawMoonPlatform(p));
      g.collectibles.forEach(star => { if (!star.taken) drawCollectible(star); });
      drawPortal(g.portal);

      if (g.status === 'won') drawUFO(g.ufo);
      drawAlien(g.alien);

      if (g.status === 'won') {
        ctx.fillStyle = 'rgba(0,0,0,0.36)';
        ctx.fillRect(0, 0, g.width, g.height);
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 34px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Portal Reached', g.width / 2, 180);
        ctx.font = '22px Arial';
        ctx.fillText('You can now fly the UFO and claim your reward.', g.width / 2, 220);
        ctx.fillText(`Points: ${g.gamePoints}`, g.width / 2, 255);
      }
    }

    function drawMoonPlatform(p) {
      ctx.fillStyle = '#dbe4ff';
      ctx.beginPath();
      ctx.ellipse(p.x + p.w / 2, p.y + p.h / 2, p.w / 2, p.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#bfc9ef';
      ctx.beginPath();
      ctx.arc(p.x + p.w * 0.28, p.y + p.h * 0.48, 7, 0, Math.PI * 2);
      ctx.arc(p.x + p.w * 0.63, p.y + p.h * 0.42, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawCollectible(star) {
      ctx.fillStyle = '#fde047';
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#fff7ae';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawPortal(portal) {
      ctx.fillStyle = '#111827';
      ctx.beginPath();
      ctx.ellipse(portal.x + portal.w / 2, portal.y + portal.h / 2, portal.w / 2, portal.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#a855f7';
      ctx.lineWidth = 5;
      ctx.stroke();
      ctx.strokeStyle = '#60a5fa';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawUFO(ufo) {
      ctx.fillStyle = '#93c5fd';
      ctx.beginPath();
      ctx.ellipse(ufo.x + ufo.w / 2, ufo.y + ufo.h / 2, ufo.w / 2, ufo.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#dbeafe';
      ctx.beginPath();
      ctx.ellipse(ufo.x + ufo.w / 2, ufo.y + ufo.h / 2 - 8, ufo.w * 0.22, ufo.h * 0.34, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(34,197,94,0.35)';
      ctx.beginPath();
      ctx.moveTo(ufo.x + 18, ufo.y + ufo.h);
      ctx.lineTo(ufo.x + ufo.w - 18, ufo.y + ufo.h);
      ctx.lineTo(ufo.x + ufo.w / 2, ufo.y + ufo.h + 50);
      ctx.closePath();
      ctx.fill();
    }

    function drawAlien(a) {
      ctx.fillStyle = '#7c3aed';
      ctx.beginPath();
      ctx.roundRect(a.x, a.y + 8, a.w, a.h - 8, 12);
      ctx.fill();
      ctx.fillStyle = '#86efac';
      ctx.beginPath();
      ctx.arc(a.x + a.w / 2, a.y + 10, 13, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111827';
      ctx.beginPath();
      ctx.arc(a.x + 10, a.y + 9, 2.3, 0, Math.PI * 2);
      ctx.arc(a.x + 18, a.y + 9, 2.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#86efac';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(a.x + 10, a.y - 3);
      ctx.lineTo(a.x + 7, a.y - 9);
      ctx.moveTo(a.x + 18, a.y - 3);
      ctx.lineTo(a.x + 21, a.y - 9);
      ctx.stroke();
    }

    function drawPlanet(x, y, r, color) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(x - r * 0.22, y - r * 0.22, r * 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    function loop() {
      updateSkyGame();
      drawSkyGame();
      animationId = requestAnimationFrame(loop);
    }

    renderMenu();
    renderGame();

    window.skyJump = skyJump;
    window.restartSkyDrop = restartSkyDrop;
    window.claimReward = claimReward;
    window.setTouchMove = setTouchMove;
  </script>
</body>
</html>
